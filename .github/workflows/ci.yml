name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@v7.3.1
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install 3.14

      - name: Install dependencies
        run: uv sync --locked --all-groups

      - name: Run ruff lint (includes S security rules)
        run: uv run ruff check .

      - name: Run ruff format check
        run: uv run ruff format --check .

      - name: Run vulture (dead code detection)
        run: uv run vulture

      # TEMPORARILY DISABLED — 59 pre-existing complexity violations (#254).
      # Re-enable after cleanup.
      # - name: Run complexipy (cognitive complexity)
      #   run: uv run complexipy

      - name: Run pip-audit (dependency vulnerabilities)
        run: |
          # Only fail if a fix exists AND the fixed version has been on
          # PyPI for more than 3 days (grace period for maintainers).
          uv run pip-audit -f json -o /tmp/audit.json || true
          python3 << 'AUDIT_GATE'
          import json, sys, urllib.request
          from datetime import datetime, timedelta, timezone

          GRACE_DAYS = 3
          cutoff = datetime.now(timezone.utc) - timedelta(days=GRACE_DAYS)

          with open("/tmp/audit.json") as f:
              data = json.load(f)

          actionable = []
          for dep in data.get("dependencies", []):
              for vuln in dep.get("vulns", []):
                  fixes = vuln.get("fix_versions", [])
                  if not fixes:
                      continue  # No fix available — not actionable
                  # Check if the earliest fix version was published > 3 days ago
                  pkg = dep["name"]
                  fix_ver = fixes[0]
                  try:
                      url = f"https://pypi.org/pypi/{pkg}/{fix_ver}/json"
                      resp = urllib.request.urlopen(url, timeout=10)
                      info = json.loads(resp.read())
                      upload = info["urls"][0]["upload_time_iso_8601"]
                      released = datetime.fromisoformat(upload)
                      if released > cutoff:
                          print(f"  SKIP {pkg} {vuln['id']}: fix {fix_ver} "
                                f"released {upload} (within {GRACE_DAYS}d grace)")
                          continue
                  except Exception:
                      pass  # PyPI lookup failed — assume old enough
                  actionable.append(
                      f"{pkg} {vuln['id']} (fix: {', '.join(fixes)})")

          if actionable:
              print(f"Vulnerabilities with fixes older than {GRACE_DAYS} days:")
              for a in actionable:
                  print(f"  {a}")
              sys.exit(1)
          else:
              print("pip-audit: no actionable vulnerabilities")
          AUDIT_GATE

      - name: Run ty type check
        run: uvx ty@0.0.24 check

  test-all:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_DB: promptgrimoire_test
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - name: Quieten Postgres logs
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -d promptgrimoire_test -c "
            ALTER SYSTEM SET log_checkpoints = off;
            ALTER SYSTEM SET log_min_messages = warning;
            SELECT pg_reload_conf();
          "

      - uses: actions/checkout@v6.0.2

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: ~/apt-cache
          key: apt-test-${{ runner.os }}-${{ hashFiles('.github/workflows/ci.yml') }}

      - name: Install system dependencies
        run: |
          if [ -d ~/apt-cache ]; then
            sudo cp -r ~/apt-cache/*.deb /var/cache/apt/archives/ 2>/dev/null || true
          fi
          sudo apt-get update -y
          sudo apt-get install -y \
            bats \
            mecab libmecab-dev \
            pandoc \
            poppler-utils \
            fontconfig \
            fonts-noto --install-recommends \
            fonts-texgyre \
            fonts-sil-gentiumplus fonts-sil-charis fonts-sil-doulos \
            fonts-sil-scheherazade fonts-sil-ezra fonts-sil-annapurna \
            fonts-sil-abyssinica fonts-sil-padauk fonts-sil-mondulkiri \
            fonts-sil-galatia fonts-sil-sophia-nubian fonts-sil-nuosusil \
            fonts-sil-taiheritagepro
          mkdir -p ~/apt-cache
          cp /var/cache/apt/archives/*.deb ~/apt-cache/ 2>/dev/null || true

      - name: Install uv
        uses: astral-sh/setup-uv@v7.3.1
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install 3.14

      - name: Install dependencies
        run: uv sync --locked --all-groups

      - name: Install JS test dependencies
        run: npm ci

      - name: Cache TinyTeX
        uses: actions/cache@v4
        with:
          path: ~/.TinyTeX
          key: tinytex-${{ runner.os }}-${{ hashFiles('scripts/setup_latex.py') }}

      - name: Install TinyTeX and LaTeX packages
        run: |
          echo "$HOME/.TinyTeX/bin/x86_64-linux" >> "$GITHUB_PATH"
          export PATH="$HOME/.TinyTeX/bin/x86_64-linux:$PATH"
          uv run python scripts/setup_latex.py
          luaotfload-tool --update --force

      - name: Run unit and integration tests
        env:
          DEV__TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/promptgrimoire_test
          OSFONTDIR: /usr/share/fonts:/usr/share/texmf/fonts
        run: uv run grimoire test all

  e2e-playwright:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_DB: promptgrimoire_test
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - name: Quieten Postgres logs
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -d promptgrimoire_test -c "
            ALTER SYSTEM SET log_checkpoints = off;
            ALTER SYSTEM SET log_min_messages = warning;
            SELECT pg_reload_conf();
          "

      - uses: actions/checkout@v6.0.2

      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y mecab libmecab-dev pandoc

      - name: Install uv
        uses: astral-sh/setup-uv@v7.3.1
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install 3.14

      - name: Install dependencies
        run: uv sync --locked --all-groups

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ matrix.browser }}-${{ runner.os }}-${{ hashFiles('uv.lock') }}

      - name: Install Playwright browsers
        run: uv run playwright install --with-deps ${{ matrix.browser }}

      - name: Run E2E tests
        env:
          DEV__TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/promptgrimoire_test
        run: uv run grimoire e2e run --browser ${{ matrix.browser }}

      - name: Upload Playwright lane artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-playwright-${{ matrix.browser }}-artifacts
          path: output/test_output/e2e/playwright/**
          if-no-files-found: ignore
          retention-days: 7

  nicegui-ui:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_DB: promptgrimoire_test
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - name: Quieten Postgres logs
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -d promptgrimoire_test -c "
            ALTER SYSTEM SET log_checkpoints = off;
            ALTER SYSTEM SET log_min_messages = warning;
            SELECT pg_reload_conf();
          "

      - uses: actions/checkout@v6.0.2

      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y mecab libmecab-dev pandoc

      - name: Install uv
        uses: astral-sh/setup-uv@v7.3.1
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install 3.14

      - name: Install dependencies
        run: uv sync --locked --all-groups

      - name: Run NiceGUI UI lane tests
        env:
          DEV__TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/promptgrimoire_test
        run: uv run grimoire e2e nicegui

      - name: Upload NiceGUI lane artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: nicegui-ui-artifacts
          path: output/test_output/e2e/nicegui/**
          if-no-files-found: ignore
          retention-days: 7

  browserstack:
    if: false  # Disabled: BrowserStack tunnel doesn't forward WebSocket upgrades reliably. See polling-only fix in _server_script.py — needs timeout tuning before re-enabling.
    needs: [quality, test-all, e2e-playwright, nicegui-ui]
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_DB: promptgrimoire_test
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y mecab libmecab-dev pandoc

      - name: Install uv
        uses: astral-sh/setup-uv@v7.3.1
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install 3.14

      - name: Install dependencies
        run: uv sync --locked --all-groups

      - name: Install Playwright runtime (minimal)
        run: uv run playwright install chromium
        # BrowserStack SDK routes execution through CDP to cloud browsers,
        # but pytest-playwright requires at least one local browser installed
        # to initialise its fixtures without error.

      - name: Run BrowserStack supported tier
        env:
          DEV__TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/promptgrimoire_test
          BROWSERSTACK_USERNAME: ${{ secrets.BROWSERSTACK_USERNAME }}
          BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}
        run: uv run grimoire e2e browserstack

      - name: Run BrowserStack unsupported tier
        if: always()
        env:
          DEV__TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/promptgrimoire_test
          BROWSERSTACK_USERNAME: ${{ secrets.BROWSERSTACK_USERNAME }}
          BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}
        run: uv run grimoire e2e browserstack unsupported
      # No artifact upload — BrowserStack session recordings and logs are
      # available in the BrowserStack dashboard, not as local files.
