repos:
  # Ruff: lint with autofix, then format
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.5
    hooks:
      # Run the linter with autofix
      - id: ruff-check
        args: [--fix]
      # Run the formatter
      - id: ruff-format

  # Shell script linting
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck
        args: [--severity=warning]
        files: ^deploy/.*\.sh$

  # JavaScript lint (Biome) — annotation static JS
  - repo: https://github.com/biomejs/pre-commit
    rev: v2.4.1
    hooks:
      - id: biome-lint
        additional_dependencies: ["@biomejs/biome@2.4.7"]
        files: ^src/promptgrimoire/static/.*\.js$

  # Type checking
  - repo: local
    hooks:
      - id: ty-check
        name: ty type check
        entry: uvx ty@0.0.24 check
        language: system
        types: [python]
        pass_filenames: false

  # Docs index regeneration
  - repo: local
    hooks:
      - id: docs-index
        name: regenerate docs/_index.md
        entry: uv run python scripts/generate_docs_index.py
        language: system
        files: ^docs/.*\.md$
        pass_filenames: false

  # Cognitive complexity gate — blocks commits with functions > 15
  - repo: https://github.com/rohaquinlop/complexipy-pre-commit
    rev: v5.1.0
    hooks:
      - id: complexipy
        args: ['--max-complexity-allowed=15']
        # _server_script.py: standalone subprocess script, not a regular module.
        # tests/: test code is not subject to complexity gates.
        # cli_loadtest.py, roleplay.py: pre-existing complexity, tracked in #253.
        # tag_management.py, tag_management_rows.py: pre-existing complexity.
        # html_input.py: pre-existing complexity, addressed in Phase 5 (#109).
        # courses.py: open_activity_settings pre-existing complexity (18).
        # pandoc.py: _move_annots_outside_restricted pre-existing complexity (22).
        # html_normaliser.py: strip_scripts_and_styles pre-existing complexity (25).
        # placement.py: _build_activity_cascade pre-existing complexity (16).
        exclude: '(_server_script\.py$|^tests/|cli_loadtest\.py$|pages/roleplay\.py$|pages/courses\.py$|tag_management\.py$|tag_management_rows\.py$|html_input\.py$|pandoc\.py$|html_normaliser\.py$|placement\.py$)'

  # Prune orphaned .pyc files (source deleted, stale bytecode remains)
  - repo: local
    hooks:
      - id: prune-orphan-pyc
        name: prune orphaned .pyc files
        entry: uv run python scripts/prune_orphan_pyc.py
        language: system
        always_run: true
        pass_filenames: false

  # JavaScript unit tests (vitest)
  - repo: local
    hooks:
      - id: vitest
        name: JS unit tests (vitest)
        entry: npx vitest run
        language: system
        files: ^(tests/js/.*\.test\.js|src/promptgrimoire/static/annotation-.*\.js)$
        pass_filenames: false

  # Shell script unit tests (BATS)
  - repo: local
    hooks:
      - id: bats-tests
        name: shell script unit tests (bats)
        entry: bats deploy/tests/
        language: system
        files: ^(deploy/.*\.sh|deploy/tests/.*)$
        pass_filenames: false

  # General pre-commit hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=1000']
        exclude: '^(paper/|ai_transcripts/|src/promptgrimoire/static/milkdown/dist/)'
      - id: check-merge-conflict
